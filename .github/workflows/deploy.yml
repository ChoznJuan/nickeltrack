name: Deploy to CT 110 (Mace)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Show context
      run: |
        echo "Hostname: $(hostname)"
        echo "User: $(whoami)"
        echo "Working dir: $PWD"
        echo "GitHub workspace: $GITHUB_WORKSPACE"

    - name: Deploy NickelTrack
      run: |
        set -e
        APP_DIR=/opt/nickeltrack
        echo "Syncing app code to ${APP_DIR}..."
        mkdir -p ${APP_DIR}/templates ${APP_DIR}/static

        # Sync app source + env_loader
        cp -f app.py        ${APP_DIR}/app.py
        cp -f env_loader.py ${APP_DIR}/env_loader.py

        # Sync directory CONTENTS into the target dirs (not the dirs themselves).
        # `cp -rf static ${APP_DIR}/static` would create ${APP_DIR}/static/static/
        # on second-and-later deploys, breaking the served assets. The trailing
        # `/.` in both source and target copies the contents and merges.
        cp -rf templates/. ${APP_DIR}/templates/
        cp -rf static/.    ${APP_DIR}/static/
        # (same fix for the legacy nested app/ dir the old unit expected)
        mkdir -p ${APP_DIR}/app
        cp -f app.py        ${APP_DIR}/app/app.py
        cp -f env_loader.py ${APP_DIR}/app/env_loader.py

        # Ensure juan owns everything we just wrote (gunicorn runs as root, but
        # the deploy workflow runs as juan — sometimes perms come out mixed)
        chown -R juan:juan ${APP_DIR}/static ${APP_DIR}/templates ${APP_DIR}/app || true

        # Seed .env from .env.example on first deploy only — never overwrite a real .env.
        # bootstrap_app.sh already does this for fresh CTs, but be defensive in case
        # the file got deleted or we're deploying to a CT set up some other way.
        if [ ! -f ${APP_DIR}/.env ]; then
          if [ -f ${APP_DIR}/.env.example ]; then
            cp ${APP_DIR}/.env.example ${APP_DIR}/.env
            chmod 600 ${APP_DIR}/.env
            echo "  WARN: created ${APP_DIR}/.env from .env.example — fill in real values before app will start"
          else
            echo "  WARN: no .env and no .env.example — app will fail to start until you create ${APP_DIR}/.env"
          fi
        else
          echo "  OK ${APP_DIR}/.env exists, not touching it"
        fi
        echo "Files synced."

    - name: Install/refresh Python dependencies
      run: |
        /opt/nickeltrack/venv/bin/pip install --quiet -r requirements.txt
        echo "Dependencies up to date."

    - name: Restart nickeltrack service
      run: |
        sudo -n systemctl restart nickeltrack
        sleep 2
        sudo -n systemctl is-active nickeltrack

    - name: Healthcheck
      run: |
        sleep 1
        if curl -fsS -o /dev/null -w "HTTP %{http_code} (app)\n" http://localhost:5100/; then
          curl -fsS -o /dev/null -w "HTTP %{http_code} (api)\n" http://localhost:5100/api/config
          echo "Deployment complete."
        else
          echo "  WARN: healthcheck failed. Most likely cause: .env is missing or has placeholder values."
          echo "  Check: ssh juan@<ct-ip> 'cat /opt/nickeltrack/.env' — replace USER/PASS/HOST/DBNAME with real values"
          sudo -n systemctl status nickeltrack --no-pager -l | head -20
          exit 1
        fi
